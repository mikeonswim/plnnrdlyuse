<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1419">
<title>Hispaniola — ATLAS Study</title>
<style>
*, *::before, *::after { box-sizing: border-box; }
:root {
  --bg: #0f1419;
  --bg-elev: #1a2028;
  --bg-card: #212a35;
  --border: #2d3846;
  --text: #e6edf3;
  --text-dim: #8b98a8;
  --accent: #d4a24c;
  --accent-dim: #8a6a30;
  --success: #4ade80;
  --danger: #ef4444;
  --font-size: 17px;
}
[data-theme="light"] {
  --bg: #faf8f3;
  --bg-elev: #ffffff;
  --bg-card: #f2ede1;
  --border: #d9d0bc;
  --text: #1a1410;
  --text-dim: #5c5245;
  --accent: #8b5a1c;
  --accent-dim: #b78841;
}
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: ui-serif, Georgia, "Iowan Old Style", "Apple Garamond", serif; font-size: var(--font-size); line-height: 1.55; -webkit-font-smoothing: antialiased; }
.sans { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
header.topbar {
  position: sticky; top: 0; z-index: 50;
  background: var(--bg-elev);
  border-bottom: 1px solid var(--border);
  padding: 10px 14px;
  display: flex; align-items: center; justify-content: space-between;
  font-family: ui-sans-serif, system-ui, sans-serif;
}
.brand { font-weight: 700; letter-spacing: 0.02em; font-size: 15px; color: var(--accent); }
.brand small { color: var(--text-dim); font-weight: 400; margin-left: 6px; }
.icon-btn { background: transparent; border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 6px 10px; font-size: 13px; cursor: pointer; }
.icon-btn:active { background: var(--bg-card); }
nav.tabs {
  position: sticky; top: 45px; z-index: 40;
  background: var(--bg-elev);
  border-bottom: 1px solid var(--border);
  display: flex; overflow-x: auto; scrollbar-width: none;
  font-family: ui-sans-serif, system-ui, sans-serif;
}
nav.tabs::-webkit-scrollbar { display: none; }
nav.tabs button {
  background: transparent; border: none; color: var(--text-dim);
  padding: 12px 16px; font-size: 14px; font-weight: 500;
  white-space: nowrap; cursor: pointer; border-bottom: 2px solid transparent;
}
nav.tabs button.active { color: var(--accent); border-bottom-color: var(--accent); }
main { padding: 16px 14px 100px; max-width: 720px; margin: 0 auto; }
h1, h2, h3, h4 { font-family: ui-serif, Georgia, serif; line-height: 1.25; }
h1 { font-size: 1.7em; margin: 0.3em 0 0.5em; color: var(--accent); }
h2 { font-size: 1.35em; margin: 1.2em 0 0.4em; border-bottom: 1px solid var(--border); padding-bottom: 0.25em; }
h3 { font-size: 1.12em; margin: 1em 0 0.3em; color: var(--accent); }
h4 { font-size: 1em; margin: 0.8em 0 0.2em; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; font-family: ui-sans-serif, sans-serif; }
p { margin: 0.6em 0; }
ul, ol { padding-left: 1.3em; }
li { margin: 0.25em 0; }
strong { color: var(--accent); font-weight: 600; }
em { color: var(--text); font-style: italic; }
table { width: 100%; border-collapse: collapse; margin: 0.8em 0; font-size: 0.92em; }
th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
th { color: var(--accent); font-family: ui-sans-serif, sans-serif; font-weight: 600; font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.04em; }
code, .mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.9em; background: var(--bg-card); padding: 1px 5px; border-radius: 4px; }
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin: 12px 0; }
.phase-list { display: grid; gap: 10px; margin-top: 12px; }
.phase-item {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 14px; cursor: pointer;
  display: flex; align-items: center; gap: 12px;
  transition: border-color 0.15s;
}
.phase-item:active { border-color: var(--accent); }
.phase-num { font-family: ui-sans-serif, sans-serif; font-size: 13px; font-weight: 700; color: var(--accent); min-width: 26px; }
.phase-title { flex: 1; font-weight: 600; }
.phase-dates { font-family: ui-sans-serif, sans-serif; font-size: 12px; color: var(--text-dim); }
.phase-check { color: var(--success); font-size: 16px; }
.progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 8px; }
.progress-bar-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
.btn {
  background: var(--accent); color: var(--bg); border: none;
  padding: 11px 18px; border-radius: 8px; font-weight: 600;
  font-family: ui-sans-serif, sans-serif; cursor: pointer; font-size: 15px;
}
.btn:active { background: var(--accent-dim); }
.btn-ghost { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin: 14px 0; }
.flashcard {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px;
  padding: 24px 18px; min-height: 220px;
  display: flex; align-items: center; justify-content: center;
  text-align: center; font-size: 1.15em; cursor: pointer;
  user-select: none;
}
.flashcard .label { font-family: ui-sans-serif, sans-serif; font-size: 11px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.08em; position: absolute; top: 14px; left: 18px; }
.flashcard-wrap { position: relative; }
.flashcard .hint { position: absolute; bottom: 10px; right: 14px; font-size: 11px; color: var(--text-dim); font-family: ui-sans-serif, sans-serif; }
.quiz-question { margin: 18px 0 10px; font-weight: 600; font-size: 1.05em; }
.quiz-options { display: grid; gap: 8px; }
.quiz-opt {
  background: var(--bg-card); border: 1px solid var(--border);
  padding: 12px 14px; border-radius: 8px; cursor: pointer;
  font-family: ui-sans-serif, sans-serif; text-align: left;
  color: var(--text); font-size: 0.98em;
}
.quiz-opt:active { border-color: var(--accent); }
.quiz-opt.correct { border-color: var(--success); background: rgba(74, 222, 128, 0.1); }
.quiz-opt.incorrect { border-color: var(--danger); background: rgba(239, 68, 68, 0.1); }
.quiz-opt:disabled { cursor: default; opacity: 1; }
.quiz-explain { margin-top: 10px; padding: 12px; background: var(--bg-elev); border-left: 3px solid var(--accent); border-radius: 4px; font-size: 0.95em; }
.timeline-item {
  display: grid; grid-template-columns: 80px 1fr; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.timeline-date { font-family: ui-sans-serif, sans-serif; font-weight: 700; color: var(--accent); font-size: 0.88em; }
.timeline-event { font-size: 0.96em; }
.figure-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin: 8px 0; }
.figure-card h4 { color: var(--accent); margin: 0 0 4px; font-size: 1em; letter-spacing: 0; text-transform: none; font-family: ui-serif, serif; }
.figure-card .era { font-family: ui-sans-serif, sans-serif; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
.glossary-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
.glossary-term { font-weight: 700; color: var(--accent); font-family: ui-sans-serif, sans-serif; }
.glossary-origin { font-size: 0.8em; color: var(--text-dim); font-style: italic; margin-left: 8px; }
.search-box { width: 100%; background: var(--bg-card); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: 8px; font-size: 15px; font-family: ui-sans-serif, sans-serif; margin-bottom: 12px; }
.settings-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); font-family: ui-sans-serif, sans-serif; font-size: 14px; }
.toggle { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; width: 48px; height: 26px; position: relative; cursor: pointer; }
.toggle.on { background: var(--accent); border-color: var(--accent); }
.toggle-dot { position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; background: var(--bg); border-radius: 50%; transition: left 0.2s; }
.toggle.on .toggle-dot { left: 24px; }
.score-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-family: ui-sans-serif, sans-serif; background: var(--bg-elev); color: var(--text-dim); }
.score-badge.good { color: var(--success); }
.notice { background: var(--bg-elev); border-left: 3px solid var(--accent); padding: 10px 12px; border-radius: 4px; margin: 10px 0; font-size: 0.93em; color: var(--text-dim); }
.phase-nav { display: flex; justify-content: space-between; gap: 10px; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); font-family: ui-sans-serif, sans-serif; font-size: 14px; }
.phase-nav button { background: var(--bg-card); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; cursor: pointer; flex: 1; }
.phase-nav button.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }
.font-ctrl { display: inline-flex; gap: 4px; }
.font-ctrl button { background: var(--bg-card); border: 1px solid var(--border); color: var(--text); width: 32px; height: 32px; border-radius: 6px; font-weight: 700; cursor: pointer; }
.home-greet { font-family: ui-sans-serif, sans-serif; color: var(--text-dim); margin-top: 8px; font-size: 14px; }
.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 14px 0; }
.stat { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 10px; text-align: center; }
.stat-num { font-size: 1.4em; font-weight: 700; color: var(--accent); font-family: ui-sans-serif, sans-serif; }
.stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; font-family: ui-sans-serif, sans-serif; }
blockquote { margin: 10px 0; padding: 8px 14px; border-left: 3px solid var(--accent-dim); color: var(--text-dim); font-style: italic; }
.chip { display: inline-block; padding: 3px 10px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 12px; font-size: 12px; color: var(--text-dim); margin: 3px 4px 3px 0; font-family: ui-sans-serif, sans-serif; }
.filter-row { display: flex; gap: 6px; overflow-x: auto; padding: 4px 0 10px; scrollbar-width: none; }
.filter-row::-webkit-scrollbar { display: none; }
.filter-row button { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-dim); padding: 6px 12px; border-radius: 14px; font-size: 12px; font-family: ui-sans-serif, sans-serif; cursor: pointer; white-space: nowrap; }
.filter-row button.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
@media (max-width: 500px) {
  .stat-grid { grid-template-columns: repeat(3, 1fr); }
  .timeline-item { grid-template-columns: 70px 1fr; }
}
</style>

<main id="view"></main>
<script>
/* ============================================================
   DATA — all content lives here
   ============================================================ */
const PHASES = [];
const FIGURES = [];
const GLOSSARY = [];
const TIMELINE = [];
const QUIZZES = {};
const FLASHCARDS = {};
const ECONOMY = [];
/* PHASES, FIGURES, GLOSSARY, TIMELINE, QUIZZES, FLASHCARDS are populated below by data blocks */
</script>
<script id="data-phases">
PHASES.push({
  id: 1, title: "Pre-Columbian Hispaniola", dates: "~4000 BCE – 1492 CE",
  summary: "Three migration waves, Taíno civilization, five cacicazgos, life before Europe.",
  sections: [
    { h: "Orientation", p: [
      "Most histories of the Dominican Republic start with Columbus. That's a colonial convention, not a fact. There were people on Hispaniola for roughly 5,500 years before Europe arrived. The last of those societies — the <strong>Taíno</strong> — were a substantial, organized civilization, not a scatter of primitives. Understanding who was on the island before 1492 is essential to understanding what was destroyed, what survived in mixed form, and why early DR history takes the shape it does."
    ]},
    { h: "Three migration waves", p: [
      "<strong>Wave 1 — Casimiroid (~4000 BCE – ~500 BCE).</strong> First humans reached Hispaniola from Central America, likely via Belize/Honduras → Cuba → Hispaniola. Pre-ceramic, pre-agricultural hunter-gatherers. Stone tool users. Small bands.",
      "<strong>Wave 2 — Ortoiroid (~500 BCE – ~500 CE).</strong> South American-origin people moved up the Lesser Antilles from the Orinoco basin. Mixed with the Casimiroid. Still pre-agricultural.",
      "<strong>Wave 3 — Arawakan (ancestors of the Taíno, ~500 CE onward).</strong> Arawakan-speaking agriculturalists from the Orinoco basin moved north through the Lesser Antilles and reached Hispaniola around 500–600 CE. They brought <strong>ceramics, agriculture, village life, and organized chieftaincy</strong>. By ~1200 CE their culture had consolidated into classic Taíno civilization."
    ]},
    { h: "The five cacicazgos", p: [
      "By 1492, Hispaniola was divided into five chiefdoms (<em>cacicazgos</em>), each led by a chief (<em>cacique</em>). Memorize these — they show up constantly in the Columbus story:"
    ], table: {
      head: ["Cacicazgo", "Region (modern)", "Cacique at contact"],
      rows: [
        ["Marién", "Northwest DR / northern Haiti", "Guacanagarí"],
        ["Maguá", "Northeast DR (Cibao valley)", "Guarionex"],
        ["Maguana", "Central DR", "Caonabo (fiercest)"],
        ["Higüey", "Southeast DR", "Cayacoa, later Cotubanamá"],
        ["Xaraguá", "Southwest Haiti / south DR", "Bohechío, then Anacaona"]
      ]
    }},
    { h: "Society and economy", p: [
      "<strong>Political structure:</strong> caciques at the top, <em>nitaínos</em> (nobility) below, <em>naborías</em> (commoners) below them. Inheritance was <strong>matrilineal</strong> — power passed through the female line, often from a chief to his sister's son. <strong>Anacaona</strong>, sister of Bohechío and wife of Caonabo, was the most powerful woman in the Caribbean at contact — poet, composer of <em>areítos</em> (ceremonial songs), queen of Xaraguá.",
      "<strong>Economy:</strong> Taíno cultivated <em>yuca</em> (cassava) on raised mounds called <em>conucos</em> — agricultural tech ideal for Caribbean soil. Yuca bread (<em>casabe</em>) was the staple. They also grew maize, sweet potato, peppers, beans, squash, and tobacco. Fishing and seagoing canoes (<em>canoa</em>) supported inter-island trade with Cuba and Puerto Rico.",
      "<strong>Religion:</strong> polytheistic, centered on <em>zemís</em> — spirit-beings represented in carved wood, stone, shell, and cotton. Chief deities: <em>Yúcahu</em> (male, cassava and sea), <em>Atabey</em> (mother goddess, fertility, freshwater). The <em>cohoba</em> ritual involved inhaling hallucinogenic snuff through carved tubes to commune with zemís. Priests were called <em>behiques</em>.",
      "<strong>Ceremonial life:</strong> every village of consequence had a <em>batey</em> — a rectangular ceremonial ball court lined with stone slabs. The game was simultaneously sport, religious ritual, and diplomacy. The word survives in modern Dominican Spanish, now meaning the housing area around a sugar mill."
    ]},
    { h: "Population — a disputed number", p: [
      "This matters because it measures the scale of what was destroyed. Modern estimates range wildly:",
      "• Low-end (Rosenblat, 1954): ~100,000<br>• Mid-range (most current archaeology): <strong>300,000 – 750,000</strong><br>• High-end (Cook & Borah, 1971): up to 8 million<br>• Bartolomé de las Casas (contemporaneous, polemical): 3 million",
      "Best-supported current estimate: <strong>several hundred thousand to roughly one million</strong>. The uncertainty itself tells you how thoroughly the Taíno were erased."
    ]},
    { h: "Other peoples on the island", p: [
      "<strong>Ciguayos</strong>: a possibly distinct people on the northeastern Samaná peninsula, spoke a related but separate language (Ciguayo/Macoríx). Scholars still debate whether they were a distinct ethnicity or a Taíno dialect group.",
      "<strong>Kalinago (Caribs)</strong>: raiding parties from the Lesser Antilles pushed northwest toward Hispaniola. A genuine threat on eastern coasts. Spanish ethnography of them as 'cannibals' was partly self-serving — it justified enslaving anyone labeled as Carib."
    ]},
    { h: "What ended — and what didn't", p: [
      "<strong>What ended:</strong> Taíno political structure (gone within a generation). Organized Taíno society (collapsed by ~1550). Roughly 85–95% of the indigenous population — through disease (smallpox, measles, flu — no immunity), forced labor under the <em>encomienda</em>, and violence.",
      "<strong>What didn't end:</strong> Taíno genetic contribution. Modern Dominicans carry 15–25% Taíno mitochondrial DNA in the maternal line. Cultural and linguistic residue: yuca, casabe, hamaca, batey, huracán — the entire vocabulary of Caribbean agriculture and weather. Some mountain communities in DR and Cuba maintained significant Taíno ancestry and practices into the 19th–20th centuries.",
      "The framing 'the Taíno went extinct' is a colonial convenience. More accurate: <strong>the Taíno were destroyed as a political and cultural entity, but survived genetically and linguistically in the people of the modern Spanish Caribbean.</strong> This matters later — Dominican racial identity was constructed around the category <em>indio</em>, which papered over African ancestry by invoking a romantic Taíno past."
    ]},
    { h: "Geography to carry forward", p: [
      "Fix the physical island in your head:",
      "• Hispaniola is the <strong>second-largest Caribbean island</strong> (after Cuba), ~30,000 sq mi.<br>• <strong>Four parallel mountain ranges</strong> run east-west: Cordillera Septentrional (north coast), Cordillera Central (backbone, with Pico Duarte — highest in the Caribbean at 3,098 m), Sierra de Neiba, Sierra de Bahoruco.<br>• Between them: fertile valleys. The <strong>Cibao</strong> has been the demographic and agricultural heartland of the DR for 500 years.<br>• <strong>Eastern half</strong> (DR): more arable land, better rainfall on windward side, better harbors.<br>• <strong>Western half</strong> (Haiti): more mountainous, drier on leeward side, less naturally productive."
    ]},
    { h: "What's contested", p: [
      "• Population at contact (100,000 to 8 million — still open).<br>• Whether Ciguayo were linguistically distinct or a Taíno dialect.<br>• Relative weight of disease, forced labor, warfare, and starvation in the population collapse.<br>• Whether Carib 'cannibalism' was real behavior, Spanish construct, or both."
    ]}
  ]
});
</script>
<script id="data-phases-2">
PHASES.push({
  id: 2, title: "Columbus and Conquest", dates: "1492 – 1550s",
  summary: "First contact, La Navidad, founding of Santo Domingo, the encomienda, the Taíno collapse, first enslaved Africans.",
  sections: [
    { h: "First contact — October 1492", p: [
      "Columbus's first voyage (three ships — <em>Niña</em>, <em>Pinta</em>, <em>Santa María</em>) departed Palos de la Frontera August 3, 1492. Landfall on <strong>October 12, 1492</strong> at an island in the Bahamas the Taíno called Guanahaní (Columbus renamed it San Salvador). He reached <strong>Hispaniola on December 5, 1492</strong>, coasting along the north shore.",
      "Columbus named the island <em>La Isla Española</em> — 'the Spanish Isle' — which eventually became Hispaniola. He made initial contact with cacique <strong>Guacanagarí</strong> of Marién, who was welcoming and gave Columbus gold ornaments, setting off the gold obsession that drove everything that followed."
    ]},
    { h: "La Navidad — first European settlement in the Americas", p: [
      "On Christmas Day 1492, the <em>Santa María</em> ran aground off the north coast of modern Haiti. Columbus built <strong>La Navidad</strong> from the wreck's timbers and left 39 men behind when he sailed for Spain in January 1493. It was the first European settlement in the Americas.",
      "When Columbus returned on his second voyage in November 1493, <strong>La Navidad was gone</strong> — burned, its men all dead. The Taíno (under <strong>Caonabo</strong> of Maguana) had destroyed it after the Spaniards raped Taíno women and fought over gold. The first European colony lasted less than a year. It set the template."
    ]},
    { h: "Second voyage and La Isabela (1493–1496)", p: [
      "Columbus returned with 17 ships and roughly 1,200 men. He founded <strong>La Isabela</strong> on the north coast in January 1494 — the first formal European town in the Americas. It failed within two years: bad site, disease, starvation, internal mutiny.",
      "In 1495, Columbus imposed a <strong>tribute system</strong> on the Taíno of the Cibao: every adult had to deliver a hawk's bell full of gold (or cotton) every three months. Those who couldn't meet it were mutilated or killed. This is when the systematic destruction begins."
    ]},
    { h: "Santo Domingo founded (1496)", p: [
      "In 1496, Columbus's brother <strong>Bartolomé Colón</strong> founded a settlement on the south coast at the mouth of the Ozama River. Originally Nueva Isabela, then moved in 1502 to its permanent site and renamed <strong>Santo Domingo de Guzmán</strong>.",
      "Santo Domingo became the <strong>oldest continuously inhabited European city in the Americas</strong> and the administrative capital of Spain's New World empire for decades. The first cathedral (1540), first university (1538), and first hospital in the Americas are all here. The colonial zone (Zona Colonial) survives as UNESCO World Heritage."
    ]},
    { h: "The encomienda system", p: [
      "Spanish settlers ('encomenderos') received grants (<em>encomiendas</em>) of Taíno labor in exchange for nominal obligations to Christianize and 'protect' them. In practice: forced labor in mines and fields, separation of families, catastrophic mortality. The <em>encomienda</em> was de facto slavery with a legal veneer.",
      "<strong>Nicolás de Ovando</strong>, governor 1502–1509, institutionalized the system at industrial scale. He arrived with 2,500 colonists and organized the labor draft that crushed the remaining Taíno population."
    ]},
    { h: "The destruction of the cacicazgos", p: [
      "<strong>1495 — Caonabo</strong> of Maguana captured by Alonso de Ojeda via a ruse (offered brass manacles as 'gifts'). Dies on a Spanish ship en route to Europe.",
      "<strong>1503 — Massacre of Jaragua.</strong> Ovando invited Queen <strong>Anacaona</strong> and 80 Xaraguá nobles to a feast, then burned the meeting house with them inside. Anacaona was hanged separately. The most powerful woman in the Caribbean, executed at roughly age 39.",
      "<strong>1504 — Higüey war.</strong> Cacique <strong>Cotubanamá</strong> led a revolt against Spanish abuses. Captured, executed. End of organized Taíno resistance in the lowlands."
    ]},
    { h: "First enslaved Africans (1502)", p: [
      "The earliest documented enslaved Africans in the Americas arrived on Hispaniola in <strong>1502</strong>, with Ovando's fleet. They were initially <em>ladinos</em> — Africans who had been enslaved in Iberia first. By the 1510s, direct importation from West Africa had begun. Hispaniola is the <strong>origin site of African chattel slavery in the Americas</strong>. Within a generation the model that would define five centuries of Atlantic history was locked in."
    ]},
    { h: "The Dominican friars push back", p: [

      "The <strong>Manifesto of January 16, 1844</strong> (written before the uprising) was the founding document. It declared independence and listed Haitian abuses — cultural, religious, economic, political. It deliberately did not mention slavery because Dominican independence had to hold the support of both the formerly enslaved population (who feared loss of emancipation) and landowning conservatives (who did not want any slavery question reopened). The compromise: the new republic would <strong>abolish slavery permanently</strong>, keeping Boyer's emancipation intact. This is why there was no mass popular resistance to independence among darker-skinned Dominicans.",

  { term: "España Boba", origin: "Spanish", def: "'Foolish Spain.' The 1809–1821 period when Spain nominally ruled Santo Domingo but provided no actual administration or support. Led directly to the Ephemeral Independence." },

  { term: "Gavilleros", origin: "Spanish", def: "Rural guerrillas who resisted the first US occupation (1916–1924) in the eastern provinces." },
  { term: "Gens de couleur libres", origin: "French", def: "'Free people of color.' A middle caste in pre-revolutionary Saint-Domingue — ~30,000 in 1789. Many were wealthy, some slaveholders. Key actors in the early revolution." },
  { term: "Grito de Capotillo", origin: "Spanish", def: "'Cry of Capotillo.' The August 16, 1863 flag-raising on Capotillo hill near Dajabón that launched the War of Restoration against Spain." },
  { term: "Guardia Nacional", origin: "Spanish", def: "Dominican constabulary created and trained during the US occupation (1916–1924). Became the army after US withdrawal. Trujillo rose through it; its institutional cohesion made his dictatorship possible." },
  { term: "Hato", origin: "Spanish", def: "Cattle ranch. Dominant economic form in Spanish Santo Domingo for centuries. Hateros (ranchers) were a key political class — Santana came from this stratum." },
  { term: "Hispanidad", origin: "Spanish", def: "Ideology constructed by Balaguer under Trujillo. Defines Dominican identity as white, Catholic, Spanish-descended, and specifically not-Haitian. The canonical text is La isla al revés (1983)." },
  { term: "Hispaniola", origin: "from Spanish 'La Española'", def: "The whole island shared by the Dominican Republic and Haiti. Second-largest in the Caribbean (~30,000 sq mi). Columbus's name, 'La Isla Española,' stuck." },
  { term: "Independencia Efímera", origin: "Spanish", def: "'Ephemeral Independence.' Núñez de Cáceres's 70-day republic (December 1, 1821 – February 9, 1822) as the 'Independent State of Spanish Haiti.'" },
  { term: "La Trinitaria", origin: "Spanish", def: "Secret society founded July 16, 1838 by Juan Pablo Duarte. Members recruited in groups of three for security. Led the February 27, 1844 independence uprising." },
  { term: "Loyalists (1965)", origin: "Spanish", def: "The faction during the April 1965 civil war that opposed Bosch's restoration and supported the military government. Led by General Wessin y Wessin." },
  { term: "Maroons", origin: "from Spanish 'cimarrón'", def: "Escaped enslaved people forming independent communities. Enriquillo's 14-year resistance in the Bahoruco was effectively a maroon state." },
  { term: "Naboría", origin: "Taíno", def: "Taíno commoner class, below the nitaíno nobility. The majority of the population." },
  { term: "Nitaíno", origin: "Taíno", def: "Taíno noble class. Advisors and subordinate chiefs below the cacique." },
  { term: "Perejil", origin: "Spanish", def: "Parsley. Shibboleth used during the 1937 massacre: suspected Haitians were asked to pronounce 'perejil,' and those who couldn't produce the trilled 'r' were killed." },
  { term: "Quisqueya", origin: "Taíno", def: "Taíno name for the eastern part of Hispaniola (sometimes for the whole island). Used poetically for the Dominican Republic — e.g., the national anthem 'Quisqueyanos valientes.'" },
  { term: "Reconquista", origin: "Spanish", def: "The 1808–1809 Dominican-led military expulsion of French rule from Santo Domingo. Culminated in the Battle of Palo Hincado and the French surrender in July 1809." },
  { term: "Saint-Domingue", origin: "French", def: "French name for the western third of Hispaniola, 1697–1804. World's richest sugar colony. Became Haiti upon independence in 1804." },
  { term: "Sentencia 168-13", origin: "Spanish", def: "Dominican Constitutional Tribunal ruling of September 23, 2013 that retroactively stripped citizenship from Dominican-born children of undocumented Haitian migrants going back to 1929. Affected ~200,000+ people, many stateless." },
  { term: "SIM", origin: "Spanish abbrev.", def: "Servicio de Inteligencia Militar. Trujillo's military intelligence / secret police. Ran torture centers (La 40), disappeared and killed thousands." },
  { term: "Taíno", origin: "Taíno", def: "Dominant pre-Columbian people of the Greater Antilles. Arawakan-speaking, agricultural, chiefdom-level society. Devastated 1492–1550 but genetically and linguistically persistent." },
  { term: "Tortuga", origin: "Spanish", def: "Small island off northwestern Hispaniola. Early 17th-century base of French and English buccaneers. Launching point for French settlement of western Hispaniola." },
  { term: "Trabucazo", origin: "Spanish", def: "Blunderbuss shot. Specifically, Mella's signal shot at Puerta de la Misericordia on February 27, 1844, starting the independence uprising." },
  { term: "Yuca", origin: "Taíno", def: "Cassava / manioc. Taíno staple crop. Processed into casabe bread." },
  { term: "Zemí", origin: "Taíno", def: "Taíno spirit-being or deity, represented in carved wood, stone, shell, and cotton figures. Central to Taíno religion." }
);

<script id="data-quizzes-1">
QUIZZES[1] = [
  { q: "Which migration wave first reached Hispaniola, and roughly when?", opts: ["Arawak, ~500 CE", "Casimiroid, ~4000 BCE", "Ortoiroid, ~500 BCE", "Carib, ~1200 CE"], correct: 1, explain: "The Casimiroid tradition, pre-agricultural hunter-gatherers from Central America, reached Hispaniola around 4000 BCE. Arawakan ancestors of the Taíno came much later, around 500 CE." },
  { q: "Who was the cacique of Maguana — the chiefdom that destroyed La Navidad?", opts: ["Guacanagarí", "Guarionex", "Caonabo", "Bohechío"], correct: 2, explain: "Caonabo, of Carib descent and considered the fiercest of the five caciques, destroyed La Navidad in 1493. He was captured in 1495 and died en route to Spain." },
  { q: "What was Anacaona's role?", opts: ["Taíno priestess who performed cohoba rituals", "Queen of Xaraguá, poet, executed in 1503", "Cacique who negotiated peace with Columbus", "Leader of the 1519 rebellion in Bahoruco"], correct: 1, explain: "Anacaona was queen of Xaraguá — sister of Bohechío and wife of Caonabo. A composer of areítos and the most powerful woman in the pre-contact Caribbean. Hanged by order of Ovando after the Jaragua massacre in 1503." },
  { q: "What staple crop did Taíno cultivate on raised mounds called 'conucos'?", opts: ["Maize", "Yuca (cassava)", "Sweet potato", "Plantains"], correct: 1, explain: "Yuca (cassava) was the Taíno staple, processed into casabe bread. Conucos were raised earthen planting mounds — an agricultural technology ideally suited to Caribbean soil." },
  { q: "How was Taíno political power passed?", opts: ["Strict patrilineal inheritance", "Elected by nitaíno councils", "Matrilineal — often from a chief to his sister's son", "Rotating among cacicazgos"], correct: 2, explain: "Taíno inheritance was matrilineal. Power passed through the female line, commonly from a chief to his sister's son. This is why Anacaona — sister of a cacique — could herself hold power." },
  { q: "What proportion of modern Dominicans typically carry Taíno mitochondrial DNA in the maternal line?", opts: ["Less than 2%", "Roughly 15–25%", "Around 50%", "Over 70%"], correct: 1, explain: "Studies consistently find 15–25% of Dominicans carry indigenous mtDNA. The Taíno were destroyed as a political and cultural entity but survived genetically in the mixed population of the modern Spanish Caribbean." }
];
QUIZZES[2] = [
  { q: "What was La Navidad?", opts: ["The first Spanish cathedral in the Americas", "The first European settlement in the Americas — built from the Santa María wreck", "Columbus's flagship on the first voyage", "Núñez de Cáceres's 1821 capital"], correct: 1, explain: "La Navidad was the first European settlement in the Americas, built from the wreck of the Santa María on Christmas Day 1492. Destroyed by Caonabo's forces by 1493." },
  { q: "Who founded Santo Domingo?", opts: ["Christopher Columbus in 1492", "Bartolomé Colón in 1496", "Diego Colón in 1509", "Nicolás de Ovando in 1502"], correct: 1, explain: "Bartolomé Colón, Christopher's younger brother, founded the original settlement in 1496. It was moved to its permanent site in 1502 and became the oldest continuously inhabited European city in the Americas." },
  { q: "The encomienda system was:", opts: ["A Taíno trading network adopted by Spain", "A royal protection order for indigenous peoples", "A labor grant giving settlers 'charge' of indigenous laborers — de facto slavery with legal veneer", "A religious conversion program supervised by Franciscans"], correct: 2, explain: "Encomienda was a Spanish grant of indigenous labor to settlers with nominal obligations to Christianize and 'protect.' In practice it was forced labor. It destroyed the Taíno population within two generations." },
  { q: "In what year did the first documented enslaved Africans arrive in the Americas?", opts: ["1492", "1502", "1519", "1542"], correct: 1, explain: "The earliest documented enslaved Africans arrived on Hispaniola in 1502 with Nicolás de Ovando's fleet. Hispaniola is the origin site of African chattel slavery in the Americas." },

  { q: "Enriquillo's rebellion (1519–1533) ended with:", opts: ["His defeat and execution", "A treaty with Charles V granting freedom and a reservation", "His escape to Cuba", "Peace imposed by the Dominican friars"], correct: 1, explain: "Spain could not dislodge Enriquillo from the Bahoruco mountains for 14 years. In 1533, Charles V granted him and his followers freedom and a reservation. He died shortly after. It was the last Taíno political act." }

QUIZZES[3] = [
  { q: "Why did Spain neglect Hispaniola after the 1540s?", opts: ["Climate disasters made the island unprofitable", "Silver discoveries in Mexico and Peru shifted imperial focus", "Portuguese competition closed Caribbean markets", "A papal decree redirected Spanish energies"], correct: 1, explain: "Cortés's conquest of the Aztecs (1521) and Pizarro's conquest of the Inca (1533), plus the opening of Potosí silver in 1545, shifted Spanish treasure fleets to Veracruz, Portobelo, and Havana. Hispaniola became a backwater." },
  { q: "What did Francis Drake do in January 1586?", opts: ["Attacked Havana", "Destroyed Cartagena de Indias", "Occupied Santo Domingo for a month and extorted ransom", "Founded Jamaica's Port Royal"], correct: 2, explain: "Drake captured Santo Domingo in January 1586 with a small fleet, occupied it for a month, and extorted 25,000 ducats before burning part of the city. The humiliation confirmed Spain's Caribbean decline." },

QUIZZES[4] = [
  { q: "By the 1780s, Saint-Domingue produced roughly what share of the world's sugar?", opts: ["About 10%", "About 25%", "About 40%", "About 70%"], correct: 2, explain: "Saint-Domingue produced roughly 40% of the world's sugar and 60% of the world's coffee by the 1780s. It was the single most profitable colony on earth and the engine of French Atlantic wealth." },

QUIZZES[5] = [
  { q: "What event is considered the launch of the Haitian Revolution?", opts: ["The storming of Cap-Français in 1789", "The Bois Caïman ceremony of August 14, 1791", "Toussaint's constitution of 1801", "The Battle of Vertières in 1803"], correct: 1, explain: "The Bois Caïman ceremony, led by Dutty Boukman and Cécile Fatiman in the northern mountains on August 14, 1791, launched the uprising. One week later, the northern plain erupted." },

  { q: "Where did Toussaint Louverture die?", opts: ["In battle at Vertières", "In exile in Jamaica", "A French prison at Fort de Joux", "Executed publicly in Cap-Français"], correct: 2, explain: "Toussaint was lured to a parlay in June 1802, arrested, and shipped to France. He died chained in a cell at Fort de Joux in the Jura Mountains on April 7, 1803." },

  { q: "What was the Battle of Palo Hincado (November 7, 1808)?", opts: ["Toussaint's defeat of the Spanish", "Dominican forces under Juan Sánchez Ramírez defeating French troops in 45 minutes", "Napoleon's victory over British forces", "A Haitian-Dominican border skirmish"], correct: 1, explain: "Juan Sánchez Ramírez led Dominican and Spanish-allied forces to decisive victory over French General Ferrand in just 45 minutes. Ferrand committed suicide on the battlefield. The Reconquista led to French surrender of Santo Domingo in July 1809." }

QUIZZES[6] = [
  { q: "'España Boba' refers to:", opts: ["The 1809–1821 period of Spanish neglect over Santo Domingo", "A Spanish satirical newspaper of the 1820s", "Ferdinand VII's nickname for the Dominican colony", "Balaguer's term for Trujillo's foreign policy"], correct: 0, explain: "'Foolish Spain.' The 1809–1821 period when Spain nominally ruled Santo Domingo but provided no administration, troops, or investment. Dominicans concluded Spain was a dead sovereign." },
  { q: "The 'Movimiento Fronterizo' of late 1821 involved:", opts: ["Dominicans rising against Boyer", "Border towns declaring allegiance to Haiti before Santo Domingo's independence", "Spanish authorities fleeing inland", "A peasant uprising in Bahoruco"], correct: 1, explain: "Border and northern towns — Dajabón, Monte Cristi, Puerto Plata — declared for Haiti in late 1821, before Núñez de Cáceres moved in the capital. The movement was led mainly by Dominicans of African descent who wanted the guaranteed abolition Haiti offered." }

QUIZZES[7] = [
  { q: "What did Núñez de Cáceres name his new state in December 1821?", opts: ["República Dominicana", "Estado Independiente del Haití Español (Independent State of Spanish Haiti)", "República de Santo Domingo", "República Quisqueyana"], correct: 1, explain: "'Spanish Haiti' — using the Taíno-derived name for the whole island (Ayiti) to describe the Spanish-speaking part. Linguistically standard at the time but politically catastrophic given what happened nine weeks later." },

QUIZZES[9] = [

QUIZZES[10] = [

QUIZZES[11] = [
  { q: "Why did Santana re-annex the DR to Spain in 1861?", opts: ["Fear of US annexation", "Dominican Republic was militarily indefensible and fiscally bankrupt; Spanish protection looked like the solution", "Royal request from Queen Isabella II", "Catholic Church demand"], correct: 1, explain: "Santana argued — and some historians agree — that the young republic was financially and militarily unsustainable on its own. The American Civil War conveniently neutralized the Monroe Doctrine. Spain moved into the window." },

QUIZZES[12] = [

QUIZZES[13] = [

QUIZZES[14] = [

<script>
/* ============================================================
   APP — router, rendering, state

const state = {
  tab: "home",
  phaseIdx: 0,
  fcIdx: 0,
  fcSide: "front",
  quizPhaseId: null,
  quizQIdx: 0,

function loadProgress() {
  try {
    return JSON.parse(localStorage.getItem("atlas-hispaniola") || "{}");
  } catch { return {}; }
}
function saveProgress() {
  localStorage.setItem("atlas-hispaniola", JSON.stringify(state.progress));
}
function markPhaseRead(id) {
  state.progress.read = state.progress.read || {};
  state.progress.read[id] = true;
  saveProgress();
}
function saveQuizScore(id, score, total) {
  state.progress.quiz = state.progress.quiz || {};
  const prev = state.progress.quiz[id];
  if (!prev || score > prev.score) state.progress.quiz[id] = { score, total, date: Date.now() };
  saveProgress();
}

function changeFont(delta) {
  const root = document.documentElement;
  const cur = parseInt(getComputedStyle(root).getPropertyValue("--font-size")) || 17;
  const next = Math.max(13, Math.min(22, cur + delta));
  root.style.setProperty("--font-size", next + "px");
  localStorage.setItem("atlas-font", next);
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute("data-theme");
  const next = cur === "light" ? "dark" : "light";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem("atlas-theme", next);
}
(function initPrefs() {
  const f = localStorage.getItem("atlas-font");
  if (f) document.documentElement.style.setProperty("--font-size", f + "px");
  const t = localStorage.getItem("atlas-theme");
  if (t) document.documentElement.setAttribute("data-theme", t);
})();

function setTab(id) { state.tab = id; render(); window.scrollTo(0, 0); }

  const hasQ = QUIZZES[p.id] && QUIZZES[p.id].length;
  let html = `
    <div class="chip">Phase ${p.id} of ${PHASES.length}</div>
    <div class="chip">${p.dates}</div>
    <h1>${p.title}</h1>
    <div class="home-greet" style="margin-bottom:18px">${p.summary}</div>
  `;
  for (const s of p.sections) {
    html += `<h2>${s.h}</h2>`;
    if (s.p) for (const para of s.p) html += `<p>${para}</p>`;
    if (s.table) {
      html += `<table><thead><tr>${s.table.head.map(h => `<th>${h}</th>`).join("")}</tr></thead><tbody>`;
      for (const r of s.table.rows) html += `<tr>${r.map(c => `<td>${c}</td>`).join("")}</tr>`;
      html += `</tbody></table>`;
    }
    if (s.list) html += `<ul>${s.list.map(li => `<li>${li}</li>`).join("")}</ul>`;
    if (s.quote) html += `<blockquote>${s.quote}</blockquote>`;
  }
  const btns = [];
  if (hasFC) btns.push(`<button class="btn" onclick="openFlash(${p.id})">Flashcards →</button>`);
  if (hasQ) btns.push(`<button class="btn btn-ghost" onclick="openQuiz(${p.id})">Quiz →</button>`);
  html += `<div class="btn-row" style="margin-top:20px">${btns.join("")}</div>`;
  html += `<div class="phase-nav">
    <button onclick="navPhase(-1)" ${state.phaseIdx === 0 ? 'disabled style="opacity:0.4"' : ''}>← Previous</button>
    <button class="primary" onclick="navPhase(1)" ${state.phaseIdx === PHASES.length - 1 ? 'disabled style="opacity:0.4"' : ''}>Next →</button>
  </div>`;
  return html;
}
function navPhase(d) {
  const n = state.phaseIdx + d;
  if (n >= 0 && n < PHASES.length) { state.phaseIdx = n; render(); window.scrollTo(0, 0); }
}

function openFlash(id) { state.quizPhaseId = id; state.fcIdx = 0; state.fcSide = "front"; state.tab = "flash"; render(); }
function renderFlash() {
  const ids = state.quizPhaseId ? [state.quizPhaseId] : PHASES.map(p => p.id).filter(i => FLASHCARDS[i]);
  if (!ids.length) return "<h1>Flashcards</h1><p>No flashcards yet.</p>";
  let html = `<h1>Flashcards</h1>`;
  html += `<div class="filter-row">`;
  html += `<button class="${!state.quizPhaseId ? 'active' : ''}" onclick="setFCFilter(null)">All</button>`;
  PHASES.filter(p => FLASHCARDS[p.id]).forEach(p =>
    html += `<button class="${state.quizPhaseId === p.id ? 'active' : ''}" onclick="setFCFilter(${p.id})">P${p.id}</button>`
  );
  html += `</div>`;
  const pool = [];
  ids.forEach(i => (FLASHCARDS[i] || []).forEach(c => pool.push({ ...c, phaseId: i })));
  if (!pool.length) return html + `<p>No flashcards for this phase yet.</p>`;
  if (state.fcIdx >= pool.length) state.fcIdx = 0;
  const card = pool[state.fcIdx];
  html += `<div class="flashcard-wrap"><div class="flashcard" onclick="flipFC()">
    <div class="label">Phase ${card.phaseId} · ${state.fcIdx + 1} / ${pool.length}</div>
    <div>${state.fcSide === "front" ? card.q : card.a}</div>
    <div class="hint">tap to ${state.fcSide === "front" ? "reveal" : "hide"}</div>
  </div></div>`;
  html += `<div class="btn-row">
    <button class="btn btn-ghost" onclick="stepFC(-1)">← Back</button>
    <button class="btn" onclick="stepFC(1)">Next →</button>
    <button class="btn btn-ghost" onclick="shuffleFC(${pool.length})">Shuffle</button>
  </div>`;
  return html;
}
function setFCFilter(id) { state.quizPhaseId = id; state.fcIdx = 0; state.fcSide = "front"; render(); }
function flipFC() { state.fcSide = state.fcSide === "front" ? "back" : "front"; render(); }
function stepFC(d) {
  const ids = state.quizPhaseId ? [state.quizPhaseId] : PHASES.map(p => p.id).filter(i => FLASHCARDS[i]);
  const pool = [];
  ids.forEach(i => (FLASHCARDS[i] || []).forEach(c => pool.push(c)));
  state.fcIdx = (state.fcIdx + d + pool.length) % pool.length;
  state.fcSide = "front";
  render();
}
function shuffleFC(n) { state.fcIdx = Math.floor(Math.random() * n); state.fcSide = "front"; render(); }

function openQuiz(id) { state.quizPhaseId = id; state.quizQIdx = 0; state.quizAnswered = false; state.quizScore = 0; state.tab = "quiz"; render(); }
function renderQuiz() {
  if (!state.quizPhaseId) {
    let html = `<h1>Quizzes</h1><p class="home-greet">Pick a phase to drill. Scoring saves to your profile.</p>`;
    html += `<div class="phase-list">`;
    PHASES.filter(p => QUIZZES[p.id]).forEach(p => {
      const sc = (state.progress.quiz || {})[p.id];
      html += `<div class="phase-item" onclick="openQuiz(${p.id})">
        <div class="phase-num">${String(p.id).padStart(2,'0')}</div>
        <div style="flex:1"><div class="phase-title">${p.title}</div>
        <div class="phase-dates">${QUIZZES[p.id].length} questions${sc ? ` · best ${sc.score}/${sc.total}` : ''}</div></div>
        ${sc && sc.score / sc.total >= 0.8 ? '<div class="phase-check">✓</div>' : ''}
      </div>`;
    });
    html += `</div>`;
    return html;
  }
  const qs = QUIZZES[state.quizPhaseId] || [];
  const phase = PHASES.find(p => p.id === state.quizPhaseId);
  if (state.quizQIdx >= qs.length) {
    const pct = Math.round(100 * state.quizScore / qs.length);
    saveQuizScore(state.quizPhaseId, state.quizScore, qs.length);
    return `<h1>Done — Phase ${state.quizPhaseId}</h1>
      <div class="card" style="text-align:center">
        <div style="font-size:3em;font-weight:700;color:var(--accent);font-family:ui-sans-serif">${state.quizScore}/${qs.length}</div>
        <div style="color:var(--text-dim);font-family:ui-sans-serif">${pct}% · ${pct >= 80 ? 'Strong' : pct >= 60 ? 'Passing' : 'Drill more'}</div>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="openQuiz(${state.quizPhaseId})">Retry</button>
        <button class="btn btn-ghost" onclick="state.quizPhaseId=null;render()">All quizzes</button>
      </div>`;
  }
  const q = qs[state.quizQIdx];
  let html = `<div class="chip">Phase ${state.quizPhaseId} · ${phase.title}</div>
    <div class="chip">Q ${state.quizQIdx + 1} / ${qs.length}</div>
    <div class="chip score-badge ${state.quizScore === state.quizQIdx ? 'good' : ''}">Score ${state.quizScore}/${state.quizQIdx}</div>
    <div class="quiz-question">${q.q}</div>
    <div class="quiz-options">`;
  q.opts.forEach((opt, i) => {
    let cls = "quiz-opt";
    if (state.quizAnswered) {
      if (i === q.correct) cls += " correct";
      else if (i === state.quizAnswered - 1) cls += " incorrect";
    }
    html += `<button class="${cls}" ${state.quizAnswered ? 'disabled' : ''} onclick="answerQuiz(${i})">${String.fromCharCode(65+i)}. ${opt}</button>`;
  });
  html += `</div>`;
  if (state.quizAnswered) {
    html += `<div class="quiz-explain"><strong>${state.quizAnswered - 1 === q.correct ? '✓ Correct' : '✗ Incorrect'}.</strong> ${q.explain}</div>`;
    html += `<div class="btn-row"><button class="btn" onclick="nextQuizQ()">${state.quizQIdx < qs.length - 1 ? 'Next →' : 'See results'}</button></div>`;
  }
  return html;
}
function answerQuiz(i) {
  const q = QUIZZES[state.quizPhaseId][state.quizQIdx];
  state.quizAnswered = i + 1;
  if (i === q.correct) state.quizScore++;
  render();
}
function nextQuizQ() { state.quizQIdx++; state.quizAnswered = false; render(); }

function renderEconomy() {
  const modIdx = state.econIdx || 0;
  const mod = ECONOMY[modIdx];
  if (!mod) return "<p>No economy module loaded.</p>";
  let html = `<div class="chip">Economy module ${modIdx + 1} of ${ECONOMY.length}</div>
    <h1>${mod.title}</h1>
    <div class="home-greet" style="margin-bottom:12px">${mod.summary}</div>
    <div class="filter-row">`;
  ECONOMY.forEach((m, i) =>
    html += `<button class="${i === modIdx ? 'active' : ''}" onclick="setEcon(${i})">${m.title.split('—')[0].trim().split(/\s+/).slice(0,3).join(' ')}</button>`
  );
  html += `</div>`;
  for (const s of mod.sections) {
    html += `<h2>${s.h}</h2>`;
    if (s.p) for (const para of s.p) html += `<p>${para}</p>`;
    if (s.table) {
      html += `<table><thead><tr>${s.table.head.map(h => `<th>${h}</th>`).join("")}</tr></thead><tbody>`;
      for (const r of s.table.rows) html += `<tr>${r.map(c => `<td>${c}</td>`).join("")}</tr>`;
      html += `</tbody></table>`;
    }
  }
  html += `<div class="phase-nav">
    <button onclick="navEcon(-1)" ${modIdx === 0 ? 'disabled style="opacity:0.4"' : ''}>← Previous</button>
    <button class="primary" onclick="navEcon(1)" ${modIdx === ECONOMY.length - 1 ? 'disabled style="opacity:0.4"' : ''}>Next →</button>
  </div>`;
  return html;
}
function setEcon(i) { state.econIdx = i; render(); window.scrollTo(0, 0); }
function navEcon(d) {
  const cur = state.econIdx || 0;
  const n = cur + d;
  if (n >= 0 && n < ECONOMY.length) { state.econIdx = n; render(); window.scrollTo(0, 0); }
}

function renderTimeline() {
  let html = `<h1>Timeline</h1><p class="home-greet">All major dates from pre-Columbian era to present. Scroll chronologically.</p>`;
  TIMELINE.forEach(t => {
    html += `<div class="timeline-item"><div class="timeline-date">${t.date}</div><div class="timeline-event"><strong>${t.title}</strong>${t.desc ? ' — ' + t.desc : ''}</div></div>`;
  });
  return html;
}

function renderFigures() {
  let html = `<h1>Key figures</h1>
    <input class="search-box" placeholder="Search figures…" oninput="filterFigures(this.value)" id="fig-search">
    <div class="filter-row">
      <button class="${state.filter==='all'?'active':''}" onclick="setFig('all')">All</button>
      <button class="${state.filter==='indigenous'?'active':''}" onclick="setFig('indigenous')">Indigenous</button>
      <button class="${state.filter==='colonial'?'active':''}" onclick="setFig('colonial')">Colonial</button>
      <button class="${state.filter==='revolutionary'?'active':''}" onclick="setFig('revolutionary')">Revolutionary</button>
      <button class="${state.filter==='republic'?'active':''}" onclick="setFig('republic')">19th c.</button>
      <button class="${state.filter==='modern'?'active':''}" onclick="setFig('modern')">20th-21st c.</button>
    </div>
    <div id="fig-list">`;
  html += figureListHTML();
  html += `</div>`;
  return html;
}
function figureListHTML(query="") {
  const q = (query||"").toLowerCase();
  return FIGURES.filter(f => state.filter === "all" || f.cat === state.filter)
    .filter(f => !q || (f.name+f.bio+f.era).toLowerCase().includes(q))
    .map(f => `<div class="figure-card"><div class="era">${f.era}</div><h4>${f.name}</h4><p style="margin:0;font-size:0.95em">${f.bio}</p></div>`)
    .join("");
}
function filterFigures(v) { document.getElementById("fig-list").innerHTML = figureListHTML(v); }
function setFig(c) { state.filter = c; render(); }

function renderGlossary() {
  let html = `<h1>Glossary</h1>
    <input class="search-box" placeholder="Search terms…" oninput="filterGloss(this.value)" id="gl-search">
    <div id="gl-list">`;
  html += glossaryListHTML();
  html += `</div>`;
  return html;
}
function glossaryListHTML(query="") {
  const q = (query||"").toLowerCase();
  return [...GLOSSARY].sort((a,b) => a.term.localeCompare(b.term))
    .filter(g => !q || (g.term+g.def+g.origin).toLowerCase().includes(q))
    .map(g => `<div class="glossary-item"><span class="glossary-term">${g.term}</span><span class="glossary-origin">${g.origin||''}</span><div style="margin-top:4px;font-size:0.95em">${g.def}</div></div>`)
    .join("");
}
function filterGloss(v) { document.getElementById("gl-list").innerHTML = glossaryListHTML(v); }

/* Initial render happens after all data scripts load */
window.addEventListener("load", render);
</script>
</body>
</html>
